<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사용자 등록</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <div class="logo">WebDemo</div>
        <ul class="nav">
          <li><a href="/">Home</a></li>
          <li><a href="/about.html">about</a></li>
          <li><a href="/contact.html">contact</a></li>
          <li><a href="/list.html">List</a></li>
          <li><a href="/timetable.html">TimeTable</a></li>
          <li><a href="/media.html">Media</a></li>
          <li><a href="/register.html">Register</a></li>
        </ul>
      </div>
    </nav>

    <section class="main">
      <div class="container">
        <h1>사용자 등록</h1>

        <form action="#" method="post">
          <fieldset>
            <legend>기본 정보</legend>
            <p>
              <label for="username">이름:</label>
              <input type="text" id="username" name="username" required />
            </p>
            <p>
              <label for="email">이메일:</label>
              <input type="email" id="email" name="email" required />
            </p>
            <p>
              <label for="password">비밀번호:</label>
              <input type="password" id="password" name="password" required />
            </p>
          </fieldset>

          <fieldset>
            <legend>추가 정보</legend>
            <p>
              성별:
              <label
                ><input type="radio" name="gender" value="male" /> 남자</label
              >
              <label
                ><input type="radio" name="gender" value="female" /> 여자</label
              >
            </p>
            <p>
              관심분야:
              <label
                ><input type="checkbox" name="interest" value="html" />
                HTML</label
              >
              <label
                ><input type="checkbox" name="interest" value="css" />
                CSS</label
              >
              <label
                ><input type="checkbox" name="interest" value="js" />
                JavaScript</label
              >
            </p>
            <p>
              <label for="message">자기소개:</label><br />
              <textarea
                id="message"
                name="message"
                rows="5"
                cols="40"
              ></textarea>
            </p>
          </fieldset>

          <p>
            <input type="submit" value="등록하기" />
            <input type="reset" value="다시쓰기" />
          </p>
        </form>
      </div>
    </section>
  </body>
</html>
