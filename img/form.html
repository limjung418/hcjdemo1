<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <fieldset>
        <legend>로그인</legend>
        <label for="user id">아이디(6자리 이상)</label>
        <input
          type="text"
          id="user-id"
          size="10"
          value="홍길이"
          maxlength="20"
        />
        <br />

        <label for="user id">패스워드</label>
        <input type="password" id="user-pass" size="10" />
        <br />

        <input type="submit" value="로그인" />
      </fieldset>

      <fieldset>
        <legend>배송 정보</legend>
        search: <input type="search" name="" id="" /> <br />
        url: <input type="url" name="" id="" /> <br />
        email: <input type="email" name="" id="" /> <br />
        tel: <input type="tel" name="" id="" /> <br />

        <p>Choose your favorite Web language:</p>

        <form>
          <input type="radio" id="html" name="fav_language" value="HTML" />
          <label for="html">HTML</label><br />
          <input type="radio" id="css" name="fav_language" value="CSS" />
          <label for="css">CSS</label><br />
          <input
            type="radio"
            id="javascript"
            name="fav_language"
            value="JavaScript"
          />
          <label for="javascript">JavaScript</label> <br />

          <input type="radio" name="python" id="fav_language" value="python" />
          <label for="c">c</label><br />

          <input type="radio" name="fav_language" id="c" value="c" />
          <label for="c">c</label><br />

          <h1>checkbox</h1>
          <form>
            <input type="checkbox" id="vehicle1" name="vehicle1" value="Bike" />
            <label for="vehicle1"> I have a bike</label><br />
            <input type="checkbox" id="vehicle2" name="vehicle2" value="Car" />
            <label for="vehicle2"> I have a car</label><br />
            <input type="checkbox" id="vehicle3" name="vehicle3" value="Boat" />
            <label for="vehicle3"> I have a boat</label>
          </form>
        </form>
      </fieldset>
    </form>
    <h1>input type</h1>
    <input type="button" onclick="alert('Hello World!')" value="Click Me!" />
    <button>click me!</button>
    <br />
    <label for="favcolor">Select your favorite color:</label>
    <input type="color" id="favcolor" name="favcolor" />
    <br />
    <label for="birthday">Birthday:</label>
    <input type="date" id="birthday" name="birthday" />
  </body>
</html>
